<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Ahana Pranayama Center — WhatsApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0D3D35;
      color: #F8F4EC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #1A6B5E;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #C9861F;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 13px;
      color: #AACCBB;
      margin-bottom: 28px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(201,134,31,0.3);
      border-top-color: #C9861F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .message {
      font-size: 16px;
      color: #F8F4EC;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .hint {
      font-size: 13px;
      color: #AACCBB;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      background: #25D366;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
    }
  </style>
  <script>
    const WA_URL = "https://wa.me/918105408254?text=Hi.%20I%20am%20interested%20in%20having%20a%20better%20life%20through%20Pranayama.%20Please%20let%20me%20know%20the%20next%20steps.";
    window.onload = function() {
      setTimeout(function() {
        window.location.href = WA_URL;
      }, 1500);
    };
  </script>
</head>
<body>
  <div class="card">
    <div class="logo-text">Ahana Pranayama Center</div>
    <div class="sub">Science-backed breath. Stress ends here.</div>
    <div class="spinner"></div>
    <p class="message">Opening WhatsApp for you...</p>
    <p class="hint">You will be redirected in a moment.</p>
    <a class="btn" href="https://wa.me/918105408254?text=Hi.%20I%20am%20interested%20in%20having%20a%20better%20life%20through%20Pranayama.%20Please%20let%20me%20know%20the%20next%20steps.">
      Open WhatsApp Now
    </a>
  </div>
</body>
</html>
